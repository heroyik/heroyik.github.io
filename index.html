<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heroyik moved</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';"
    />
    <meta http-equiv="refresh" content="10; url=https://heroyik.gitlab.io/" />
    <script src="/assets/js/redirect.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: #181a20;
        --text: #f5f2ea;
        --muted: #b8b1a3;
        --accent: #48f0a4;
        --accent-strong: #1fd67f;
        --line: rgba(245, 242, 234, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(72, 240, 164, 0.16), transparent 32%),
          linear-gradient(135deg, #101114 0%, #17181d 52%, #0f1412 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 26, 32, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 18px;
        max-width: 11ch;
        font-size: clamp(3rem, 9vw, 6.25rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .lede {
        max-width: 58ch;
        color: var(--muted);
        font-size: clamp(1.05rem, 2.4vw, 1.35rem);
        line-height: 1.5;
      }

      .icon-row {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 26px;
        color: var(--text);
      }

      .brand-icon {
        width: 44px;
        height: 44px;
        flex: 0 0 auto;
      }

      .brand-arrow {
        width: clamp(54px, 12vw, 86px);
        height: 24px;
        flex: 0 0 auto;
        color: var(--accent);
        filter: drop-shadow(0 0 12px rgba(72, 240, 164, 0.28));
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 0 20px;
        background: var(--accent);
        color: #08110c;
        font-weight: 900;
        text-decoration: none;
        transition:
          background 160ms ease,
          transform 160ms ease;
      }

      .button:focus-visible,
      .button:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .note {
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body>
    <main>
      <p class="eyebrow">New spot just dropped</p>
      <h1>GitLab era.</h1>
      <p class="lede">
        Big love, GitHub. You held it down. As of June 10, 2026,
        heroyik is pulling up at <strong>heroyik.gitlab.io</strong> now. Chill
        for 10 seconds and I will slide you over.
      </p>
      <div class="icon-row" aria-label="Moving from GitHub to GitLab">
        <svg
          class="brand-icon"
          viewBox="0 0 16 16"
          aria-label="GitHub"
          role="img"
        >
          <path
            fill="currentColor"
            d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8"
          />
        </svg>
        <svg
          class="brand-arrow"
          viewBox="0 0 96 28"
          aria-hidden="true"
          focusable="false"
        >
          <path
            d="M4 16C24 4 47 4 72 16"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-width="3"
          />
          <path
            d="M67 7 82 17 65 23"
            fill="none"
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="3"
          />
        </svg>
        <svg
          class="brand-icon"
          viewBox="0 0 36 36"
          aria-label="GitLab"
          role="img"
        >
          <path
            fill="#e24329"
            d="M7.8 11.2 10.7 2.4c.3-.9 1.6-.9 1.9 0l2.8 8.8H7.8Zm12.8 0 2.8-8.8c.3-.9 1.6-.9 1.9 0l2.9 8.8h-7.6Z"
          />
          <path
            fill="#fc6d26"
            d="M18 33.2 7.8 11.2H1.6L18 33.2Zm0 0 10.2-22h6.2L18 33.2Z"
          />
          <path
            fill="#fca326"
            d="M1.6 11.2h6.2L18 33.2 2.3 21.8c-.7-.5-1-1.4-.7-2.2l3-8.4Zm32.8 0h-6.2L18 33.2l15.7-11.4c.7-.5 1-1.4.7-2.2l-3-8.4Z"
          />
        </svg>
      </div>
      <div class="actions">
        <a
          class="button"
          href="https://heroyik.gitlab.io/"
          data-redirect-now
        >
          Pull up on GitLab now
        </a>
        <p class="note">Ten seconds is optional. The new spot is already live.</p>
      </div>
    </main>
  </body>
</html>
