<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>heroyik moved</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self';"
    />
    <meta http-equiv="refresh" content="10; url=https://heroyik.gitlab.io/" />
    <script src="/assets/js/redirect.js"></script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101114;
        --panel: #181a20;
        --text: #f5f2ea;
        --muted: #b8b1a3;
        --accent: #48f0a4;
        --accent-strong: #1fd67f;
        --line: rgba(245, 242, 234, 0.18);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 20% 20%, rgba(72, 240, 164, 0.16), transparent 32%),
          linear-gradient(135deg, #101114 0%, #17181d 52%, #0f1412 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 680px);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(24, 26, 32, 0.88);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
      }

      p {
        margin: 0;
      }

      .eyebrow {
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 18px;
        max-width: 11ch;
        font-size: clamp(3rem, 9vw, 6.25rem);
        line-height: 0.92;
        letter-spacing: 0;
      }

      .lede {
        max-width: 58ch;
        color: var(--muted);
        font-size: clamp(1.05rem, 2.4vw, 1.35rem);
        line-height: 1.5;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        align-items: center;
        margin-top: 30px;
      }

      .button {
        display: inline-flex;
        min-height: 48px;
        align-items: center;
        justify-content: center;
        border-radius: 8px;
        padding: 0 20px;
        background: var(--accent);
        color: #08110c;
        font-weight: 900;
        text-decoration: none;
        transition:
          background 160ms ease,
          transform 160ms ease;
      }

      .button:focus-visible,
      .button:hover {
        background: var(--accent-strong);
        transform: translateY(-1px);
      }

      .note {
        color: var(--muted);
        font-size: 0.95rem;
      }
    </style>
  </head>

  <body>
    <main>
      <p class="eyebrow">Heads up</p>
      <h1>We moved.</h1>
      <p class="lede">
        On June 10, 2026, heroyik packed up and slid over to
        <strong>heroyik.gitlab.io</strong>. Hang tight, you are getting sent
        there in 10 seconds.
      </p>
      <div class="actions">
        <a
          class="button"
          href="https://heroyik.gitlab.io/"
          data-redirect-now
        >
          Bounce now
        </a>
        <p class="note">No need to wait if you are already ready.</p>
      </div>
    </main>
  </body>
</html>
